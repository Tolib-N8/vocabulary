name: iOS unsigned IPA

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    # Expo SDK 57 needs Swift 6.2, i.e. Xcode 26 — the default on macos-26 runners
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -workspace ios/Vocabulary.xcworkspace \
            -scheme Vocabulary \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r vocabulary-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: vocabulary-unsigned-ipa
          path: vocabulary-unsigned.ipa
